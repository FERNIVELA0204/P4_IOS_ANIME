<!DOCTYPE html>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

    <h2>Personajes principales</h2>

    <!-- CONTENEDOR DE PERSONAJES -->
    <div class="personajes">

        <div class="card">
            <img src="gojo.jpg" alt="Gojo">
            <p>Satoru Gojo</p>
        </div>

        <div class="card">
            <img src="yuji.jpg" alt="Yuji">

            <img src="megumi.jpg" alt="Megumi">
